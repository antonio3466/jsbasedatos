<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./boton.css">
    <title>Nuevo Dato</title>
</head>
<body>
    <h1>Agregar Datos</h1>

    <label>Apellido:</label>
    <input id="apellido" type="text" placeholder="Ingrese Apellido">
    <br><br>

    <label>Nombre:</label>
    <input id="nombre" type="text" placeholder="Ingrese Nombre">
    <br><br>

    <label>DNI:</label>
    <input id="dni" type="text" placeholder="Ingrese DNI">
    <br><br>

    <label>Correo Electrónico:</label>
    <input id="email" type="text" placeholder="Ingrese Correo Electrónico">
    <br><br>

    <label>Fecha de Nacimiento:</label>
    <input id="fechaNacimiento" type="text" placeholder="Ingrese Fecha de Nacimiento">
    <br><br>

    <button id="grabar" class="boton-enlace">Grabar</button>
    <a href="./index.html" id="volver" class="boton-enlace">Volver</a>

    <script src="./agregarDatos.js"></script>
</body>
</html>
